name: Auto Deploy

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

steps:
  - name: SSH Deploy
    uses: appleboy/ssh-action@master
    with:
      host: 192.168.1.43
      username: racha
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      script: |
        cd /home/racha/load-balancer-lab
        docker-compose down
        docker-compose up -d
